<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/image/icon.png">
    <title>NutriProof - Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        }
        .login-logo {
            max-height: 80px;
        }
        #reset-section {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="text-center mb-3">
            <img src="/static/image/logo-imx.png" alt="Logo" class="login-logo mb-2">
            <h4>NutriProof</h4>
        </div>

        <!-- Login Form -->
        <div id="login-section">
            <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
            <div class="mb-3">
                <label for="login-email" class="form-label">Courriel</label>
                <input type="email" class="form-control" id="login-email" placeholder="nom@exemple.com" required>
            </div>
            <div class="mb-3">
                <label for="login-password" class="form-label">Mot de passe</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="login-password" placeholder="Mot de passe" required>
                    <button class="btn btn-outline-secondary" type="button" id="toggle-password" tabindex="-1">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button class="btn btn-primary w-100 mb-2" id="btn-login">Se connecter</button>
            <div class="text-center">
                <a href="#" id="show-reset" class="small">Mot de passe oublié ?</a>
            </div>
        </div>

        <!-- Password Reset Form -->
        <div id="reset-section">
            <div id="reset-message" class="alert d-none" role="alert"></div>
            <div class="mb-3">
                <label for="reset-email" class="form-label">Courriel</label>
                <input type="email" class="form-control" id="reset-email" placeholder="nom@exemple.com" required>
            </div>
            <button class="btn btn-warning w-100 mb-2" id="btn-reset-password">Réinitialiser le mot de passe</button>
            <div class="text-center">
                <a href="#" id="show-login" class="small"><i class="bi bi-arrow-left"></i> Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script src="/static/js/firebaseAuth.js"></script>
</body>
</html>
